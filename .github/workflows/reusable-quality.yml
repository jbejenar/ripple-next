name: Reusable Quality Gates

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version override. Leave empty to read from .nvmrc.'
        type: string
        required: false
        default: ''
      run-iac-scan:
        description: 'Run IaC policy scan (set true if sst.config.ts exists)'
        type: boolean
        required: false
        default: false
    outputs:
      status:
        description: 'Overall quality gate status (pass/fail)'
        value: ${{ jobs.quality.outputs.status }}

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.result.outputs.status }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node.js (from .nvmrc)
        if: inputs.node-version == ''
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Setup Node.js (explicit version)
        if: inputs.node-version != ''
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo build artifacts
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('.nvmrc') }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('.nvmrc') }}-
            turbo-${{ runner.os }}-

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Readiness drift guard
        run: pnpm check:readiness

      - name: Quarantine policy check
        run: pnpm check:quarantine

      - name: IaC policy scan
        if: inputs.run-iac-scan
        run: pnpm check:iac

      - name: Set output
        id: result
        if: always()
        run: echo "status=${{ job.status == 'success' && 'pass' || 'fail' }}" >> "$GITHUB_OUTPUT"
