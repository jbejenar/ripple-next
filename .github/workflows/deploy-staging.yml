name: Deploy Staging
on:
  push:
    branches: [main]

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      has-credentials: ${{ steps.check.outputs.has-credentials }}
    steps:
      - id: check
        env:
          AWS_ROLE: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [ -n "$AWS_ROLE" ]; then
            echo "has-credentials=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-credentials=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deployment skipped — AWS_ROLE_ARN secret is not configured"
          fi

  deploy:
    needs: preflight
    if: needs.preflight.outputs.has-credentials == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2
      - run: pnpm install --frozen-lockfile
      - run: npx sst deploy --stage staging
      - name: Post-deploy health check
        if: always()
        run: |
          node scripts/deploy-health-check.mjs "${STAGING_URL:-https://staging.example.com}" \
            --retries=5 --interval=10 --output=health-report.json --json || true
        env:
          SST_STAGE: staging
      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: health-report-staging
          path: health-report.json
          retention-days: 30
